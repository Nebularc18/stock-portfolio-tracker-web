services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GHCR_OWNER:-nebularc18}/stock-portfolio-tracker:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://portfolio:portfolio@postgres:5432/portfolio
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      MARKETSTACK_API_KEY: ${MARKETSTACK_API_KEY:-}
      DEFAULT_USERNAME: ${DEFAULT_USERNAME:-admin}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD:-admin123}
      GUEST_USERNAME: ${GUEST_USERNAME:-guest}
      GUEST_PASSWORD: ${GUEST_PASSWORD:-guest-demo-password}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-dev-local-auth-token-secret}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-43200}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - cache_data:/app/data/cache

volumes:
  postgres_data:
  cache_data:
